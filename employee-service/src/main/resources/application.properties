spring.application.name=employee-service
spring.config.import = optional:configserver:http://localhost:8088

# Micrometer Tracing / Zipkin
management.tracing.enabled=true
spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0

# Circuit Breaker and Retry for department service
resilience4j.circuitbreaker.instances.departmentCB.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.departmentCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.departmentCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.departmentCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.departmentCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.departmentCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.departmentCB.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.departmentServiceRetry.maxAttempts=3
resilience4j.retry.instances.departmentServiceRetry.waitDuration=2s

# Circuit Breaker and Retry for organization service
resilience4j.circuitbreaker.instances.organizationCB.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.organizationCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.organizationCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.organizationCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.organizationCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.organizationCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.organizationCB.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.organizationServiceRetry.maxAttempts=3
resilience4j.retry.instances.organizationServiceRetry.waitDuration=2s

feign.circuitbreaker.enabled=true
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.endpoint.circuitbreakers.enabled=true
management.endpoint.circuitbreakerevents.enabled=true

resilience4j.circuitbreaker.instances.employee-service.register-health-indicator=true
